name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend:
    name: Backend — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Lambda bundle
        run: npm run build:lambda

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-bundle
          path: backend/dist/lambda/

  build-frontend:
    name: Frontend — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.6.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  deploy-backend:
    name: Deploy Backend → Cloudflare Workers
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Inject Cloudflare resource IDs into wrangler.jsonc
        run: |
          cp wrangler.example.jsonc wrangler.jsonc
          sed -i "s/<REPLACE_WITH_D1_DATABASE_ID>/${{ secrets.D1_DATABASE_ID }}/g" wrangler.jsonc
          sed -i "s/<REPLACE_WITH_KV_NAMESPACE_ID>/${{ secrets.KV_NAMESPACE_ID }}/g" wrangler.jsonc

      - name: Apply D1 migrations
        run: ./node_modules/.bin/wrangler d1 migrations apply starter-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        id: deploy
        run: |
          set -o pipefail
          ./node_modules/.bin/wrangler deploy 2>&1 | tee /tmp/wrangler-out.txt
          URL=$(grep -oE 'https://[a-zA-Z0-9._-]+\.workers\.dev' /tmp/wrangler-out.txt | head -1)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Show deployment URL
        run: echo "✅ Backend deployed to ${{ steps.deploy.outputs.deployment-url }}"

  deploy-frontend:
    name: Deploy Frontend → Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create Pages project if not exists
        run: npx wrangler pages project create ${{ secrets.PAGES_PROJECT_NAME }} --production-branch=main 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          set -o pipefail
          npx wrangler pages deploy dist --project-name=${{ secrets.PAGES_PROJECT_NAME }} --branch=main 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Show deployment URL
        run: echo "✅ Frontend deployed to https://${{ secrets.PAGES_PROJECT_NAME }}.pages.dev"
